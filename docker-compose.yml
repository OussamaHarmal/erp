version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: smart_cms_db
    environment:
      POSTGRES_DB: smart_cms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_cms_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/smart_cms
      SECRET_KEY: change-this-secret-key-in-production-32chars
      DEBUG: "false"
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      SAGE_EXPORT_DROP_DIR: /sage_auto_import/pending
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      
      - C:/SAGE_AUTO_IMPORT/pending:/sage_auto_import/pending
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ─── React Frontend (dev) ──────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: smart_cms_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
